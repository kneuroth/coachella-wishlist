<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coachella Wishlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- First-time setup modal -->
    <div id="setup-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-glyph">◈</div>
        <h2>Coachella<br /><em>Wishlist</em></h2>
        <p class="modal-sub">What's your name?</p>
        <input
          type="text"
          id="setup-name"
          placeholder="e.g. Taylor"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="setup-btn">Join</button>
        <div id="existing-users" class="existing-users hidden">
          <div class="modal-divider">or sign in as</div>
          <div id="existing-users-list" class="existing-users-list"></div>
        </div>
      </div>
    </div>

    <div id="app">
      <header>
        <div class="header-inner">
          <div class="header-title">
            <div class="header-eyebrow">◈ COACHELLA ◈</div>
            <h1>WISH<em>LIST</em></h1>
          </div>
          <div class="header-right">
            <span id="user-label"></span>
            <span class="year-tag">2026</span>
          </div>
        </div>
      </header>

      <main>
        <div id="loading" class="loading-state">
          <span>Loading</span>
        </div>

        <div id="error-banner" class="error-banner hidden">
          <strong>Could not reach the API.</strong>
          <span id="error-detail"></span>
        </div>

        <div id="grid-container" class="hidden">
          <div id="search-bar">
            <div class="search-row">
            <div class="search-wrap">
              <svg
                class="search-icon"
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <circle
                  cx="6.5"
                  cy="6.5"
                  r="5"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M10.5 10.5L14 14"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search artists…"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <button id="add-artist-btn" class="add-artist-btn" title="Add artist">+</button>
            </div>
            <div id="autocomplete-dropdown" class="autocomplete hidden"></div>
          </div>

          <div id="artist-grid"></div>

          <div id="empty-state" class="empty-state hidden">
            <p>No artists yet</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Bottom sheet for ranking -->
    <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
    <div id="rank-sheet" class="rank-sheet hidden">
      <div class="sheet-handle"></div>
      <h3 id="sheet-artist-name"></h3>
      <div class="sheet-buttons">
        <button class="sheet-btn btn-must" data-ranking="must_see">
          ★ Must See
        </button>
        <button class="sheet-btn btn-like" data-ranking="would_like_to_see">
          ◆ Would Like to See
        </button>
        <button class="sheet-btn btn-skip" data-ranking="would_skip">
          — Skip
        </button>
      </div>
      <button id="sheet-remove" class="sheet-remove hidden">
        Remove Rating
      </button>
    </div>

    <!-- Add artist modal -->
    <div id="add-artist-modal" class="modal hidden">
      <div class="modal-card add-artist-card">

        <div id="add-artist-form">
          <p class="modal-sub">Add an artist</p>
          <input
            type="text"
            id="add-artist-name"
            placeholder="Artist name"
            autocomplete="off"
            spellcheck="false"
          />
          <p id="add-artist-error" class="add-artist-error hidden">Already in the list</p>
          <button id="add-artist-submit">Add</button>
          <button id="add-artist-cancel" class="add-artist-cancel">Cancel</button>
        </div>

        <div id="add-artist-matches" class="hidden">
          <p class="modal-sub">Did you mean…</p>
          <div id="add-artist-matches-list" class="add-matches-list"></div>
          <button id="add-artist-anyway" class="add-artist-anyway">No, add anyway</button>
          <button id="add-artist-back" class="add-artist-cancel">← Back</button>
        </div>

      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/render.js"></script>
    <script src="js/search.js"></script>
    <script src="js/sheet.js"></script>
    <script src="js/add-artist.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
